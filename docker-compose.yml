services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nutriagent-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - nutrition_db:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/nutrition.db
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - nutriagent-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nutriagent-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - nutriagent-network

volumes:
  nutrition_db:

networks:
  nutriagent-network:
    driver: bridge
